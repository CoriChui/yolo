# YOLO Index
# ═══════════════════════════════════════════════════════════════════════════════
# Command routing and system configuration
# ═══════════════════════════════════════════════════════════════════════════════

version: 1
name: yolo
description: YOLO Development Workflow System

# ───────────────────────────────────────────────────────────────────────────────
# COMMAND ROUTING
# ───────────────────────────────────────────────────────────────────────────────

commands:
  # ─────────────────────────────────────────────────────────────────────────────
  # Feature Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "feature:start":
    description: Start a new feature
    workflow: workflows/feature-start.md
    options:
      --profile:
        values: [quality, balanced, budget, guided]
        default: balanced

  "feature:resume":
    description: Resume an in-progress feature
    workflow: workflows/feature-resume.md

  "feature:status":
    description: Show feature status
    workflow: workflows/feature-status.md

  "feature:complete":
    description: Mark feature as complete
    workflow: workflows/feature-complete.md

  "feature:new":
    description: Create a new standalone feature
    workflow: workflows/feature-start.md  # Note: feature-new.md does not exist yet; uses feature-start.md
    options:
      --profile:
        values: [quality, balanced, budget, guided]
        default: balanced

  "feature:plan":
    description: Create feature plan (research + planning)
    workflow: workflows/feature-plan.md
    options:
      --amend:
        description: Amend existing plan instead of creating new

  "feature:execute":
    description: Execute feature implementation
    workflow: workflows/feature-execute.md
    pipeline: orchestration/pipelines/feature-full.yaml
    options:
      --quick:
        pipeline: orchestration/pipelines/feature-quick.yaml

  "feature:verify":
    description: Verify feature against success criteria
    workflow: workflows/feature-verify.md

  "feature:attach":
    description: Attach standalone feature to a release
    workflow: workflows/feature-attach.md

  "feature:detach":
    description: Detach feature from release to standalone
    workflow: workflows/feature-detach.md

  "feature:unblock":
    description: Manually unblock a blocked feature
    workflow: workflows/feature-start.md  # Re-uses start with --force semantics
    options:
      --force:
        description: Force unblock even if dependencies unmet

  "feature:list":
    description: List features across releases and standalone
    action: inline

  # ─────────────────────────────────────────────────────────────────────────────
  # Release Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "release:new":
    description: Create a new release
    workflow: workflows/release-new.md

  "release:start":
    description: Start working on a release
    workflow: workflows/release-start.md

  "release:status":
    description: Show release status
    workflow: workflows/release-status.md

  "release:end":
    description: Complete a release
    workflow: workflows/release-end.md

  "release:focus":
    description: Set focused release
    workflow: workflows/release-focus.md

  "release:list":
    description: List all releases
    action: inline  # Reads state.yaml

  "release:requirements":
    description: Show release requirements
    action: inline  # Reads requirements.md

  # ─────────────────────────────────────────────────────────────────────────────
  # Intake Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "intake:capture":
    description: Capture intake materials
    workflow: workflows/intake-capture.md

  "intake:list":
    description: List intake versions
    workflow: workflows/intake-list.md

  "intake:diff":
    description: Compare intake versions
    workflow: workflows/intake-diff.md

  "intake:status":
    description: Show intake status
    workflow: workflows/intake-status.md

  "intake:add":
    description: Add local files/projects as .md digests to intake
    workflow: workflows/intake-add.md

  # ─────────────────────────────────────────────────────────────────────────────
  # Debug Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "debug":
    description: Start a debug session
    pipeline: orchestration/pipelines/debug.yaml
    workflow: workflows/debug.md

  "debug:resume":
    description: Resume a debug session
    workflow: workflows/debug-resume.md

  # ─────────────────────────────────────────────────────────────────────────────
  # Decision Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "decide":
    description: Make a design decision
    pipeline: orchestration/pipelines/design-decision.yaml

  # ─────────────────────────────────────────────────────────────────────────────
  # Quick Task Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "do":
    description: Execute a quick task
    workflow: workflows/do.md
    options:
      --track:
        description: Track in .planning/do/
        default: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Sync Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "sync":
    description: Sync with external trackers
    workflow: workflows/sync.md

  "sync-agents":
    description: Regenerate agents from sources
    config: agents/sync.yaml
    options:
      --check:
        description: Show status without regenerating
      --validate:
        description: Regenerate and validate
      --force:
        description: Force regenerate all

  # ─────────────────────────────────────────────────────────────────────────────
  # Status Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "status":
    description: Show overall project status
    workflow: workflows/status.md

  # ─────────────────────────────────────────────────────────────────────────────
  # Validation Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "validate":
    description: Validate framework integrity
    workflow: workflows/validate.md
    options:
      --structure:
        description: Check file existence and references only
      --schemas:
        description: Validate YAML parsing and required fields only
      --consistency:
        description: Check enum/status consistency across files only
      --agents:
        description: Validate generated agent integrity only
      --cross-refs:
        description: Check cross-file references only
      --fix:
        description: Auto-fix issues where possible

  # ─────────────────────────────────────────────────────────────────────────────
  # Help Commands
  # ─────────────────────────────────────────────────────────────────────────────
  "help":
    description: Show available commands
    action: show_help

  "init":
    description: Initialize YOLO in current project
    workflow: workflows/init.md

# ───────────────────────────────────────────────────────────────────────────────
# PROFILES
# ───────────────────────────────────────────────────────────────────────────────

profiles:
  location: profiles/
  default: balanced

  available:
    quality:
      file: profiles/quality.yaml
      description: Maximum quality, autonomous

    balanced:
      file: profiles/balanced.yaml
      description: Good quality, reasonable cost (DEFAULT)

    budget:
      file: profiles/budget.yaml
      description: Fast and cheap

    guided:
      file: profiles/guided.yaml
      description: Interactive research with user questions

# ───────────────────────────────────────────────────────────────────────────────
# AGENTS
# ───────────────────────────────────────────────────────────────────────────────

agents:
  sources: agents/src/
  generated: agents/generated/
  sync_config: agents/sync.yaml
  orchestrator: orchestration/agent-orchestrator.md

  registry:
    - research-thorough
    - research-quick
    - research-interactive
    - plan-detailed
    - plan-minimal
    - execute-standard
    - execute-fix
    - verify-strict
    - verify-basic
    - decide-conversation

# ───────────────────────────────────────────────────────────────────────────────
# ORCHESTRATION
# ───────────────────────────────────────────────────────────────────────────────

orchestration:
  pipelines: orchestration/pipelines/
  triggers: orchestration/triggers/
  patterns: orchestration/patterns/

  available_pipelines:
    - feature-full
    - feature-quick
    - debug
    - design-decision

  available_triggers:
    - verification-failed
    - execution-failed
    - context-pressure

  available_patterns:
    - conversation

# ───────────────────────────────────────────────────────────────────────────────
# STATE
# ───────────────────────────────────────────────────────────────────────────────

state:
  file: .planning/state.yaml
  schema: templates/state.yaml

# ───────────────────────────────────────────────────────────────────────────────
# DIRECTORIES
# ───────────────────────────────────────────────────────────────────────────────

directories:
  planning: .planning/
  releases: .planning/releases/
  features: .planning/features/
  # Note: intake is release-scoped at .planning/releases/<release-id>/intake/
  # The .planning/intake/ path is legacy and should not be used
  do: .planning/do/
  debug: .planning/debug/
  archive: .planning/archive/
  decisions: .planning/decisions/

# ───────────────────────────────────────────────────────────────────────────────
# SPECS & TEMPLATES
# ───────────────────────────────────────────────────────────────────────────────

specs:
  location: specs/
  files:
    - 00-overview.md
    - 01-intake.md
    - 02-releases.md
    - 03-features.md
    - 04-state.md
    - 05-commands.md
    - 06-schemas.md
    - 07-statuses.md

templates:
  location: templates/
  files:
    - state.yaml
    - release.yaml
    - feature.yaml
    - config.yaml
    - manifest.yaml
    - proposal.yaml
    - debug.yaml
    - do.yaml
    - sync-config.yaml

# ───────────────────────────────────────────────────────────────────────────────
# HELP OUTPUT
# ───────────────────────────────────────────────────────────────────────────────

help:
  template: |
    ═══════════════════════════════════════════════════════════════════════════════
    YOLO - Development Workflow System
    ═══════════════════════════════════════════════════════════════════════════════

    FEATURE COMMANDS
      /yolo:feature start <goal>     Start a new feature (state setup)
      /yolo:feature new <goal>       Create standalone feature
      /yolo:feature plan             Create feature plan (research + planning)
      /yolo:feature execute          Execute feature implementation
      /yolo:feature verify           Verify feature success criteria
      /yolo:feature complete         Mark feature complete
      /yolo:feature resume           Resume in-progress feature
      /yolo:feature status           Show feature status
      /yolo:feature attach <release> Attach feature to release
      /yolo:feature detach           Detach feature from release
      /yolo:feature unblock <id>     Manually unblock a blocked feature
      /yolo:feature list             List all features

    RELEASE COMMANDS
      /yolo:release new <name>       Create new release
      /yolo:release start            Start working on release
      /yolo:release focus <id>       Set focused release
      /yolo:release status           Show release status
      /yolo:release list             List all releases
      /yolo:release end              Complete release

    INTAKE COMMANDS
      /yolo:intake capture <source>  Capture intake materials
      /yolo:intake list              List intake versions
      /yolo:intake diff              Compare versions
      /yolo:intake status            Show intake status

    OTHER COMMANDS
      /yolo:debug <description>      Start debug session
      /yolo:decide <question>        Make design decision
      /yolo:do <task>                Execute quick task
      /yolo:status                   Show project status
      /yolo:sync                     Sync with external trackers
      /yolo:sync-agents              Regenerate agents
      /yolo:validate                 Validate framework integrity
      /yolo:init                     Initialize YOLO in project

    PROFILES
      --profile quality              Maximum quality (opus everywhere)
      --profile balanced             Good balance (DEFAULT)
      --profile budget               Fast and cheap (haiku/sonnet)
      --profile guided               Interactive research

    ═══════════════════════════════════════════════════════════════════════════════
