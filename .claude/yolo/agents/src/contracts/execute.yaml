# Execute Contract
# ═══════════════════════════════════════════════════════════════════════════════
# Implement a single task from a plan
# ═══════════════════════════════════════════════════════════════════════════════

name: execute
version: 1
description: Implement a single task by creating or modifying files

# ───────────────────────────────────────────────────────────────────────────────
# INPUT SCHEMA
# ───────────────────────────────────────────────────────────────────────────────

input:
  required:
    task:
      type: Task
      description: The task to execute
      schema:
        id:
          type: string
          description: Task identifier

        title:
          type: string
          description: Task title

        description:
          type: markdown
          description: What to implement

        files:
          type: list
          items:
            type: string
          description: Files to create or modify

        verification:
          type: string
          description: How to verify success

        depends_on:
          type: list
          items:
            type: string
          description: Task IDs this task depends on
          optional: true

    context:
      type: list
      items:
        type: string
      description: Additional context files to read

  optional:
    style_guide:
      type: markdown
      description: Code style guidelines to follow

    previous_attempt:
      type: object
      description: If retrying, info about previous attempt
      schema:
        error:
          type: string
          description: What went wrong
        files_changed:
          type: list
          items:
            type: string
          description: Files already modified

# ───────────────────────────────────────────────────────────────────────────────
# OUTPUT SCHEMA
# ───────────────────────────────────────────────────────────────────────────────

output:
  required:
    status:
      type: string
      enum: [completed, blocked, failed]
      description: |
        - completed: Task fully implemented
        - blocked: Cannot proceed due to external dependency
        - failed: Attempted but encountered unrecoverable error

    files_changed:
      type: list
      description: Files that were created, modified, or deleted
      items:
        type: FileChange
        schema:
          path:
            type: string
            description: File path

          action:
            type: string
            enum: [created, modified, deleted]
            description: What action was taken

    commit_message:
      type: string
      description: Appropriate commit message for changes

  optional:
    blockers:
      type: list
      items:
        type: string
      description: What's blocking completion (if status is blocked)

    notes:
      type: markdown
      description: Implementation notes, decisions made, alternatives considered

    verification_result:
      type: object
      description: Result of running verification checks
      schema:
        checks_run:
          type: list
          items:
            type: string
        all_passed:
          type: boolean
        failures:
          type: list
          items:
            type: string

# ───────────────────────────────────────────────────────────────────────────────
# TOOLS
# ───────────────────────────────────────────────────────────────────────────────

tools:
  base:
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - Bash

# ───────────────────────────────────────────────────────────────────────────────
# VALIDATION
# ───────────────────────────────────────────────────────────────────────────────

validation:
  input:
    - task.id must not be empty
    - task.files must have at least 1 item, OR previous_attempt must be provided with non-empty files_changed

  output:
    - status must be one of [completed, blocked, failed]
    - if status is completed, files_changed must not be empty
    - if status is blocked, blockers must not be empty
    - if status is completed, commit_message must not be empty and must follow conventional commit format

  invariants:
    - must Read a file before Edit
    - must not modify files outside task.files unless blocked
