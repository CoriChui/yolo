# Verify Contract
# ═══════════════════════════════════════════════════════════════════════════════
# Verify that implemented work meets success criteria
# ═══════════════════════════════════════════════════════════════════════════════

name: verify
version: 1
description: Verify work meets criteria through goal-backward verification

# ───────────────────────────────────────────────────────────────────────────────
# INPUT SCHEMA
# ───────────────────────────────────────────────────────────────────────────────

input:
  required:
    criteria:
      type: list
      items:
        type: string
      description: Success criteria to verify (from user perspective)

    files:
      type: list
      items:
        type: string
      description: Files to verify

  optional:
    run_tests:
      type: boolean
      default: true
      # Note: profiles may override this default (e.g., balanced profile sets run_tests: false)
      description: Whether to run automated tests

    strict:
      type: boolean
      default: false
      description: Whether to fail on warnings (not just errors)

    test_command:
      type: string
      description: Custom test command to run (default npm test)

    type_check_command:
      type: string
      description: Custom type check command (default npx tsc --noEmit)

    lint_command:
      type: string
      description: Custom lint command (default npm run lint)

# ───────────────────────────────────────────────────────────────────────────────
# OUTPUT SCHEMA
# ───────────────────────────────────────────────────────────────────────────────

output:
  required:
    passed:
      type: boolean
      description: Whether all criteria passed verification

    results:
      type: list
      description: Result for each criterion
      items:
        type: CheckResult
        schema:
          criterion:
            type: string
            description: The criterion being checked

          passed:
            type: boolean
            description: Whether this criterion passed

          evidence:
            type: string
            description: Concrete evidence supporting the result

  optional:
    issues:
      type: list
      description: Issues found during verification
      items:
        type: Issue
        schema:
          severity:
            type: string
            enum: [error, warning, info]
            description: |
              - error: Blocks success, must fix
              - warning: Should fix, doesn't block
              - info: Nice to know

          message:
            type: string
            description: Description of the issue

          file:
            type: string
            description: File where issue was found

          line:
            type: integer
            optional: true
            description: Line number if applicable

          suggestion:
            type: string
            optional: true
            description: How to fix the issue

    test_results:
      type: object
      description: Results from running automated tests
      schema:
        command:
          type: string
          description: Command that was run
        exit_code:
          type: integer
          description: Exit code (0 = success)
        output:
          type: string
          description: Test output (truncated if long)
        passed:
          type: integer
          description: Number of tests passed
        failed:
          type: integer
          description: Number of tests failed

    type_check_results:
      type: object
      description: Results from type checking
      schema:
        command:
          type: string
        exit_code:
          type: integer
        errors:
          type: list
          items:
            type: string

# ───────────────────────────────────────────────────────────────────────────────
# TOOLS
# ───────────────────────────────────────────────────────────────────────────────

tools:
  base:
    - Read
    - Glob
    - Grep
    - Bash

# ───────────────────────────────────────────────────────────────────────────────
# VALIDATION
# ───────────────────────────────────────────────────────────────────────────────

validation:
  input:
    - criteria must have at least 1 item
    - files must have at least 1 item

  output:
    - results.length must equal criteria.length
    - passed must be false if any results[].passed is false
    - passed must be false if any issues[].severity is "error"
    - if strict, passed must be false if any issues[].severity is "warning"
    - each result must have non-empty evidence

  methodology:
    - verify goal achievement, not just task completion
    - check from user perspective (observable truths)
    - verify artifacts exist and are correct
    - verify wiring (components connected properly)
    - identify key failure points and verify them
