# Plan Contract
# ═══════════════════════════════════════════════════════════════════════════════
# Break down a goal into executable tasks with dependencies
# ═══════════════════════════════════════════════════════════════════════════════

name: plan
version: 1
description: Break down a goal into executable tasks with dependencies and verification

# ───────────────────────────────────────────────────────────────────────────────
# INPUT SCHEMA
# ───────────────────────────────────────────────────────────────────────────────

input:
  required:
    goal:
      type: string
      description: What we're trying to achieve

    context:
      type: markdown
      description: Research findings and context for planning

  optional:
    intake_insights:
      type: list
      description: Key insights from intake materials (from research)
      items:
        type: IntakeInsight
        schema:
          source:
            type: string
          insight:
            type: string
          applies_to:
            type: list
            items:
              type: string

    gaps:
      type: list
      description: Gaps between intake requirements and codebase (from research)
      items:
        type: Gap
        schema:
          requirement:
            type: string
          current_state:
            type: string
          gap:
            type: string

    constraints:
      type: list
      items:
        type: string
      description: Constraints to respect during planning

    max_tasks:
      type: integer
      default: 5
      description: Maximum number of tasks to create

# ───────────────────────────────────────────────────────────────────────────────
# OUTPUT SCHEMA
# ───────────────────────────────────────────────────────────────────────────────

output:
  required:
    tasks:
      type: list
      description: Atomic tasks to execute
      items:
        type: Task
        schema:
          id:
            type: string
            description: Unique task identifier (e.g., "setup-auth-middleware")

          title:
            type: string
            description: Short imperative title (e.g., "Create auth middleware")

          description:
            type: markdown
            description: Detailed description of what to do

          files:
            type: list
            items:
              type: string
            description: Files to create or modify (max 3)

          depends_on:
            type: list
            items:
              type: string
            description: Task IDs this depends on

          verification:
            type: string
            description: How to verify this task succeeded

          intake_ref:
            type: string
            optional: true
            description: Which intake requirement this addresses

    execution_order:
      type: list
      items:
        type: string
      description: Ordered list of task IDs for execution

  optional:
    risks:
      type: list
      items:
        type: string
      description: Potential risks or blockers

    assumptions:
      type: list
      items:
        type: string
      description: Assumptions made during planning

    coverage:
      type: list
      description: How tasks map to intake requirements
      items:
        type: Coverage
        schema:
          requirement:
            type: string
            description: Intake requirement
          addressed_by:
            type: list
            items:
              type: string
            description: Task IDs that address this requirement

# ───────────────────────────────────────────────────────────────────────────────
# TOOLS
# ───────────────────────────────────────────────────────────────────────────────

tools:
  base:
    - Read
    - Glob
    - Grep

# ───────────────────────────────────────────────────────────────────────────────
# VALIDATION
# ───────────────────────────────────────────────────────────────────────────────

validation:
  input:
    - goal must not be empty
    - context must not be empty
    - max_tasks must be >= 1 and <= 10

  output:
    - tasks.length >= 1
    - tasks.length <= input.max_tasks
    - all task.id must be unique
    - all task.id in execution_order
    - all task.depends_on must reference valid task.id
    - no circular dependencies in depends_on
    - each task.files.length <= 3
    - if gaps provided, all gaps addressed by at least one task

  warnings:
    - task without verification criteria
    - gap not covered by any task
