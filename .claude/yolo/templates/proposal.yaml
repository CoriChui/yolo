# Intake Change Proposal — Feature-Level
# This template describes domain-knowledge change proposals discovered during feature research.
# For source-level intake modifications, see the IntakeSourceProposal schema in 06-schemas.md.
#
# Intake change request discovered during feature research.
# Location (release):    .planning/releases/<release>/features/<id>/intake-proposals/prop-<feature>-<seq>.yaml
# Location (standalone): .planning/features/<slug>/intake-proposals/prop-<feature>-<seq>.yaml
# ─────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════
# IDENTIFICATION
# ═══════════════════════════════════════════════════════════════

id: null                            # Unique ID: prop-{feature}-{seq} (e.g., "prop-02-001")
created: null                       # ISO 8601 datetime
updated: null                       # ISO 8601 datetime

# ═══════════════════════════════════════════════════════════════
# SOURCE
# ═══════════════════════════════════════════════════════════════

feature: null                       # Which feature created this (e.g., "02-auth")
author: claude                      # claude | user
discovery_ref: null                 # Reference to discovery (e.g., "research/DISCOVERY.md#2fa")

# ═══════════════════════════════════════════════════════════════
# CLASSIFICATION
# ═══════════════════════════════════════════════════════════════

type: domain                        # domain | contract | flow | constraint
severity: important                 # blocking | important | minor
status: pending                     # See status values below

# Status values:
#   pending         - Created, awaiting review
#   accepted        - Approved, ready to apply
#   accepted-queued - Approved, will apply at end of release
#   applied         - Applied to intake version
#   rejected        - Rejected with reason
#   deferred        - Deferred to next release

# ═══════════════════════════════════════════════════════════════
# CONTENT
# ═══════════════════════════════════════════════════════════════

title: null                         # Short title describing the change
# Example: "Add TwoFactorCode entity"

reason: null                        # Why this change is needed (multi-line)
# Example:
#   reason: |
#     While researching Supabase Auth 2FA, discovered that verification
#     codes are stored in the database. Feature 02 cannot implement 2FA
#     without this entity.

# List of changes to intake files
changes: []
# Example:
#   - action: add                   # add | modify | remove
#     path: domain/two-factor-code.md
#     content: |                    # For add: full file content
#       # TwoFactorCode
#
#       ## Description
#       Two-factor authentication code.
#
#       ## Fields
#       | Field | Type | Description |
#       |-------|------|-------------|
#       | id | string | UUID |
#       | userId | string | FK → User |
#       | code | string | 6-digit code |
#
#   - action: modify
#     path: domain/index.md
#     description: "Add TwoFactorCode to entity list"
#     patch: |                      # For modify: diff or description
#       @@ -15,6 +15,7 @@
#        - Contract
#        - WalletTransaction
#       +- TwoFactorCode
#
#   - action: remove
#     path: domain/deprecated.md
#     reason: "Entity no longer needed"

# Files that may need updates due to this change
impacts: []
# Example:
#   - contracts/supabase-schema.md
#   - features/02-auth/PLAN.md

# ═══════════════════════════════════════════════════════════════
# DECISION (Filled after review)
# ═══════════════════════════════════════════════════════════════

decision:
  status: null                      # approved | rejected | deferred
  decided_at: null                  # ISO 8601 datetime
  decided_by: null                  # user
  reason: null                      # Reason (required for rejected/deferred)
  applied_to: null                  # Intake version (e.g., "v1.1") when applied

# ─────────────────────────────────────────────────────────────────
# TEMPLATE NOTES
# ─────────────────────────────────────────────────────────────────
#
# When to create proposals:
# - Domain knowledge discovered during research (new entity, field, relation)
# - Contract changes (new endpoint, schema update)
# - Flow changes (new process, step modification)
# - Constraint updates (new technical/business constraint)
#
# NOT proposals (stays in feature research):
# - Implementation knowledge (which library, code structure)
# - Technical decisions (architecture choices)
#
# Severity Guide:
# - blocking:  Feature cannot continue without this change
# - important: Should be added soon, reminds at feature end
# - minor:     Nice to have, queued silently
#
# Workflow:
# 1. Claude discovers domain knowledge during research
# 2. Creates proposal with status: pending
# 3. If blocking → immediate user prompt
# 4. If important/minor → inform user, continue working
# 5. User decides: approve (--now or --queue) | reject | defer
# 6. Applied proposals create intake patches (v1 → v1.1)
#
# File naming: prop-{feature}-{sequence}.yaml
# Example: prop-02-001-two-factor-entity.yaml
