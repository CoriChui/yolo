# RELEASE.yaml Template
#
# Release goal with release-scoped intake and features.
# Location: .planning/releases/<YYYY-MM-DD-slug>/release.yaml
# ─────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════
# IDENTIFICATION
# ═══════════════════════════════════════════════════════════════

id: null                            # Full ID: YYYY-MM-DD-slug (e.g., "2026-02-04-mvp")
slug: null                          # User-provided slug (e.g., "mvp")
title: null                         # Human-readable title
created: null                       # ISO 8601 datetime

# ═══════════════════════════════════════════════════════════════
# GOALS
# ═══════════════════════════════════════════════════════════════

goal: null                          # Multi-line description of what this release delivers
# Example:
#   goal: |
#     Working moped rental management system:
#     units, clients, contracts, basic billing.

# Success criteria from user perspective
success_criteria: []
# Example:
#   - "Operator can create a new rental contract"
#   - "System charges daily fee automatically"
#   - "Financier sees balance for each client"

# ═══════════════════════════════════════════════════════════════
# INTAKE (release-scoped)
# ═══════════════════════════════════════════════════════════════

intake:
  current: null                     # Current version (e.g., "mvp-v1.1")
  locked: false                     # Locked when release completes

# ═══════════════════════════════════════════════════════════════
# FEATURES (nested in release)
# ═══════════════════════════════════════════════════════════════

features:
  total: 0                          # Total number of features
  completed: 0                      # Completed features count

  # Feature list (auto-created from research on /release start)
  list: []
  # Example:
  #   - id: "01"
  #     name: foundation
  #     status: completed           # pending | researching | planning | in_progress | blocked | verifying | completed | dropped
  #     completed_at: 2026-02-05T18:00:00Z
  #
  #   - id: "02"
  #     name: auth
  #     status: in_progress
  #     started_at: 2026-02-06T09:00:00Z
  #
  #   - id: "03"
  #     name: billing
  #     status: pending

# ═══════════════════════════════════════════════════════════════
# PROGRESS (derived/cached — computed from features section)
# ═══════════════════════════════════════════════════════════════

progress:
  features_total: 0
  features_completed: 0
  percentage: 0

# ═══════════════════════════════════════════════════════════════
# STATUS
# ═══════════════════════════════════════════════════════════════

status: pending                     # pending | active | paused | completed | failed | cancelled
started_at: null                    # ISO 8601 datetime (when /release start)
completed_at: null                  # ISO 8601 datetime (when /release end)
paused_at: null                     # ISO 8601 datetime
failed_at: null                     # ISO 8601 datetime
cancelled_at: null                  # ISO 8601 datetime

# ═══════════════════════════════════════════════════════════════
# ARCHIVE (Filled on completion)
# ═══════════════════════════════════════════════════════════════

archive:
  shipped_at: null                  # ISO 8601 datetime

  # Git commit range for this release
  git_range: null                   # e.g., "feat(01-01)..feat(04-03)"

  # Statistics (populated on completion)
  stats:
    features: null                  # Total features completed
    tasks: null                     # Total tasks completed
    files_changed: null             # Files created/modified
    lines_added: null               # Lines of code added
    duration_days: null             # Days from start to completion

# ─────────────────────────────────────────────────────────────────
# TEMPLATE NOTES
# ─────────────────────────────────────────────────────────────────
#
# Lifecycle:
# - Created: /release new <slug> (status: pending, intake created)
# - Started: /release start (status: active, features auto-created)
# - Completed: /release end (status: completed, intake locked)
#
# Parallel Releases:
# - Multiple releases can be pending or active simultaneously
# - Each release is independent (no dependencies)
# - State tracks all releases + one "focused" release
#
# Directory Structure:
#   .planning/releases/2026-02-04-mvp/
#   ├── release.yaml                ← This file
#   ├── requirements.md
#   ├── intake/                     ← Release-scoped intake
#   │   ├── mvp-v1/
#   │   │   └── manifest.yaml
#   │   └── mvp-v1.1/
#   ├── features/                   ← Release-scoped features
#   │   ├── 01-foundation/
#   │   │   └── feature.yaml
#   │   └── 02-auth/
#   └── output/                     ← Generated on completion
#       ├── schema.md
#       └── api.md
