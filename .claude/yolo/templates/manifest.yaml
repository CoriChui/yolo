# Intake Manifest Template
#
# Metadata for a release-scoped intake version snapshot.
# Location: .planning/releases/<release>/intake/<slug>-v<N>/manifest.yaml
# ─────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════
# REQUIRED FIELDS
# ═══════════════════════════════════════════════════════════════

version: null                       # Version string: "{slug}-v{N}" (e.g., "mvp-v1", "mvp-v1.1")
type: major                         # major | patch
created: null                       # ISO 8601 datetime
release: null                       # Parent release ID (e.g., "2026-02-04-mvp")

# ═══════════════════════════════════════════════════════════════
# SOURCES
# ═══════════════════════════════════════════════════════════════

sources: []
# Example:
#   - name: figma
#     captured_at: 2026-02-03T15:00:00Z
#     files: 42
#     digest: figma/digest.md
#
#   - name: notion
#     captured_at: 2026-02-03T14:30:00Z
#     files: 5
#     digest: notion/digest.md
#
#   - name: notes
#     captured_at: 2026-02-03T16:00:00Z
#     files: 3
#     digest: null                  # Manual, no digest

# ═══════════════════════════════════════════════════════════════
# FOR PATCH VERSIONS (Required when type: patch)
# ═══════════════════════════════════════════════════════════════

parent: null                        # Parent version (e.g., "mvp-v1" for mvp-v1.1)

trigger:                            # What triggered this patch
  type: null                        # proposal | external | manual
  ref: null                         # Reference (e.g., "prop-02-001")

# ═══════════════════════════════════════════════════════════════
# CONTENTS
# ═══════════════════════════════════════════════════════════════

# List of files in each category
contents:
  domain: []                        # Entity files
  # Example:
  #   - user
  #   - unit
  #   - client
  #   - contract

  contracts: []                     # API contract files
  # Example:
  #   - api
  #   - supabase-schema

  flows: []                         # Business process files
  # Example:
  #   - rental-wizard
  #   - billing
  #   - auth

  constraints: []                   # Constraint files
  # Example:
  #   - tech-stack
  #   - security

  assets:                           # Binary resources (optional)
    screenshots: 0
    exports: 0

# ═══════════════════════════════════════════════════════════════
# CHANGES FROM PARENT (Auto-generated for patches)
# ═══════════════════════════════════════════════════════════════

# Only populated for type: patch
changes_from_parent:
  added: []                         # New files
  # Example:
  #   - domain/two-factor-code.md

  modified: []                      # Changed files
  # Example:
  #   - domain/index.md

  removed: []                       # Deleted files

# ═══════════════════════════════════════════════════════════════
# METADATA (Optional)
# ═══════════════════════════════════════════════════════════════

stats:
  total_files: 0                    # Total files in this version
  sources: 0                        # Number of sources

notes: null                         # Free-form notes about this version
# Example:
#   notes: |
#     Initial intake from Figma export.
#     Includes all domain models and API contracts.

# ─────────────────────────────────────────────────────────────────
# TEMPLATE NOTES
# ─────────────────────────────────────────────────────────────────
#
# Versioning Format:
# - {release-slug}-v{major}[.{patch}]
# - Examples: mvp-v1, mvp-v1.1, mobile-v2
#
# Versioning Rules:
# - Major versions ({slug}-v1, {slug}-v2): Initial capture or full refresh
# - Patch versions ({slug}-v1.1, {slug}-v1.2): Additional material
#
# Full Snapshots:
# Each version contains EVERYTHING. No deltas, no inheritance.
# mvp-v1.1/ contains all files from mvp-v1 plus changes.
#
# Immutability:
# Once created, a version NEVER changes.
# Need changes? Create {slug}-v1.1 or {slug}-v2.
#
# Directory Structure:
#   .planning/releases/2026-02-04-mvp/intake/
#   ├── mvp-v1/
#   │   ├── manifest.yaml           ← This file
#   │   ├── figma/
#   │   │   ├── screens/
#   │   │   └── digest.md
#   │   ├── notion/
#   │   │   └── digest.md
#   │   └── notes/
#   └── mvp-v1.1/
#       └── ...
