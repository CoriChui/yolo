# Profile: Budget
# ═══════════════════════════════════════════════════════════════════════════════
# Fast and cheap — minimal overhead
# Best for: Quick tasks, prototypes, simple changes
# ═══════════════════════════════════════════════════════════════════════════════

name: budget
description: Fast and cheap for simple tasks

# ───────────────────────────────────────────────────────────────────────────────
# IMPLEMENTATION SELECTION
# ───────────────────────────────────────────────────────────────────────────────

implementations:
  research: quick         # Surface scan only
  plan: minimal           # 1-3 tasks, no extras
  execute: standard       # fix variant used automatically by triggers on verification failure
  verify: basic           # Quick sanity check
  decide: null            # Skip conversation — execute agent makes design decisions inline

# ───────────────────────────────────────────────────────────────────────────────
# MODEL OVERRIDES (optional)
# ───────────────────────────────────────────────────────────────────────────────

models:
  research: haiku
  plan: sonnet
  execute: sonnet
  verify: haiku
  decide: sonnet          # Fallback value if the decide agent is re-enabled

# ───────────────────────────────────────────────────────────────────────────────
# BEHAVIOR
# ───────────────────────────────────────────────────────────────────────────────

behavior:
  # Research settings
  research:
    depth: shallow
    include_external: false
    max_files: 10
    follow_imports: false

  # Planning settings
  plan:
    max_tasks: 3
    require_coverage: false
    include_risks: false

  # Verification settings
  verify:
    run_tests: false
    check_types: true     # Types are fast
    check_lint: false
    strict_mode: false

  # Error handling
  errors:
    max_retries: 1
    on_failure: report_and_continue

# ───────────────────────────────────────────────────────────────────────────────
# INTERACTION
# ───────────────────────────────────────────────────────────────────────────────

interaction:
  mode: autonomous
  ask_on_ambiguity: false
  ask_on_design_decision: false  # Just pick something

# ───────────────────────────────────────────────────────────────────────────────
# COST/PERFORMANCE
# ───────────────────────────────────────────────────────────────────────────────

estimates:
  tokens_per_feature: 8000-15000
  cost_per_feature: $0.05-0.15
  relative_speed: fast

# ───────────────────────────────────────────────────────────────────────────────
# USE WHEN
# ───────────────────────────────────────────────────────────────────────────────

recommended_for:
  - Quick fixes
  - Simple, well-defined tasks
  - Prototyping
  - Familiar codebase
  - Low-risk changes
  - When you're confident about the approach

not_recommended_for:
  - Complex features
  - Unfamiliar codebases
  - Security-sensitive work
  - When requirements are unclear
