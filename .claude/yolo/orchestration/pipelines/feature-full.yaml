# Pipeline: Feature Full
# ═══════════════════════════════════════════════════════════════════════════════
# Complete feature workflow with all stages
# Used by: /yolo:feature start (default)
# ═══════════════════════════════════════════════════════════════════════════════

name: feature-full
description: Complete feature workflow with research, planning, execution, and verification
version: 1

# ───────────────────────────────────────────────────────────────────────────────
# PROFILE MAPPING
# ───────────────────────────────────────────────────────────────────────────────

# Which implementations to use per profile
profiles:
  quality:
    research: thorough
    plan: detailed
    execute: standard
    verify: strict
    decide: conversation

  balanced:
    research: thorough
    plan: detailed
    execute: standard
    verify: basic
    decide: conversation

  budget:
    research: quick
    plan: minimal
    execute: standard
    verify: basic
    decide: null

  guided:
    research: interactive
    plan: detailed
    execute: standard
    verify: strict
    decide: conversation

default_profile: balanced

# ───────────────────────────────────────────────────────────────────────────────
# INPUTS
# ───────────────────────────────────────────────────────────────────────────────

inputs:
  required:
    FEATURE_GOAL:
      type: string
      description: What this feature should accomplish

    FEATURE_ID:
      type: string
      description: Unique identifier for the feature

  optional:
    RELEASE_ID:
      type: string
      description: Release identifier for tracking

    RELEASE_GOAL:
      type: string
      description: Overall release goal for context

    SCOPE:
      type: string
      default: "src/"
      description: Directory scope for research

    INTAKE_VERSION:
      type: string
      description: Intake version to use (from state)

    INTAKE_PATH:
      type: string
      description: Path to intake directory

    PROFILE:
      type: string
      default: balanced
      description: Quality/speed profile

# ───────────────────────────────────────────────────────────────────────────────
# STAGES
# ───────────────────────────────────────────────────────────────────────────────

stages:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Research
  # ─────────────────────────────────────────────────────────────────────────────
  - name: research
    description: Explore codebase and intake to understand context
    contract: research

    on_start:
      action: update_state
      updates:
        "feature.status": "researching"

    input:
      goal: "${FEATURE_GOAL}"
      scope: "${SCOPE}"
      intake:
        version: "${INTAKE_VERSION}"
        path: "${INTAKE_PATH}"
      release_context:
        release_id: "${RELEASE_ID}"
        release_goal: "${RELEASE_GOAL}"
      depth: deep
      include_external: true

    output_as: research_findings

    # Validate output before proceeding
    validate:
      - research_findings.findings is not empty
      - research_findings.relevant_files.length >= 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Plan
  # ─────────────────────────────────────────────────────────────────────────────
  - name: plan
    description: Break down goal into executable tasks
    contract: plan

    on_start:
      action: update_state
      updates:
        "feature.status": "planning"

    input:
      goal: "${FEATURE_GOAL}"
      context: "${research_findings.findings}"
      intake_insights: "${research_findings.intake_insights}"
      gaps: "${research_findings.gaps}"
      max_tasks: 5

    output_as: execution_plan

    validate:
      - execution_plan.tasks.length >= 1
      - execution_plan.execution_order.length == execution_plan.tasks.length

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: Design Decision (conditional)
  # ─────────────────────────────────────────────────────────────────────────────
  - name: decide
    description: Make design decision if plan requires one
    contract: decide

    # Only run if plan indicates decision needed
    condition: "${execution_plan.needs_decision == true}"

    input:
      question: "${execution_plan.decision_needed}"
      context: "${research_findings.findings}"
      options: "${execution_plan.decision_options}"
      priority: quality

    output_as: design_decision

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4: Execute (loop)
  # ─────────────────────────────────────────────────────────────────────────────
  - name: execute
    description: Implement each task from the plan
    contract: execute

    on_start:
      action: update_state
      updates:
        "feature.status": "in_progress"

    # Loop over all tasks in order
    loop: "${execution_plan.tasks}"
    loop_var: current_task

    input:
      task: "${current_task}"
      context: "${current_task.files}"
      style_guide: null

    output_as: execution_results[]

    # Error handling
    on_failure:
      trigger: execution-failed
      max_retries: 2

    # Validate each task result
    validate:
      - result.status in [completed, blocked]
      - if result.status == completed: result.files_changed.length >= 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5: Verify
  # ─────────────────────────────────────────────────────────────────────────────
  - name: verify
    description: Verify all work meets success criteria
    contract: verify

    on_start:
      action: update_state
      updates:
        "feature.status": "verifying"

    input:
      criteria: "${execution_plan.tasks.map(t => t.verification)}"
      files: "${execution_results.flatMap(r => r.files_changed.map(f => f.path))}"
      run_tests: true
      strict: false

    output_as: verification_result

    on_failure:
      trigger: verification-failed
      max_retries: 2

# ───────────────────────────────────────────────────────────────────────────────
# POST-PIPELINE
# ───────────────────────────────────────────────────────────────────────────────

on_complete:
  - action: update_state
    updates:
      feature.status: completed
      feature.tasks.completed: "${execution_plan.tasks.length}"

  - action: generate_summary
    template: feature-summary

  - action: create_commit
    if: "${verification_result.passed}"
    message: "feat(${FEATURE_ID}): ${FEATURE_GOAL}"

on_failure:
  - action: update_state
    updates:
      "feature.error":
        stage: "${current_stage}"
        message: "${error.message}"

  - action: report_failure
    include:
      - stage_name
      - error_message
      - partial_results

# ───────────────────────────────────────────────────────────────────────────────
# CHECKPOINTS (Persistent Pipeline State)
# ───────────────────────────────────────────────────────────────────────────────

checkpoints:
  enabled: true
  path: ".planning/features/${FEATURE_ID}/checkpoint.yaml"

  # Save checkpoint after these stages complete successfully
  after_stages:
    - research
    - plan
    - execute

  # What to persist at each checkpoint
  save:
    research:
      - research_findings         # Full research output
      - current_stage: "research"
      - completed_at: "${TIMESTAMP}"

    plan:
      - execution_plan            # Full plan output
      - research_findings         # Carry forward
      - current_stage: "plan"
      - completed_at: "${TIMESTAMP}"

    execute:
      - execution_results         # All task results
      - execution_plan            # Original plan
      - current_stage: "execute"
      - completed_at: "${TIMESTAMP}"
      - tasks_completed: "${execution_results.filter(r => r.status == 'completed').length}"
      - tasks_total: "${execution_plan.tasks.length}"

  # Restore behavior on pipeline start
  restore:
    enabled: true
    strategy: resume_after_last    # Resume from stage AFTER last checkpoint

    on_restore:
      - action: log
        message: "Restoring pipeline from checkpoint (stage: ${checkpoint.current_stage})"

      - action: load_outputs
        description: Reload stage outputs from checkpoint into pipeline context

      - action: skip_completed
        description: Skip stages that completed before checkpoint

    on_restore_failure:
      - action: log
        message: "Checkpoint restore failed — starting pipeline from scratch"
      - action: delete_checkpoint
      - action: restart_pipeline

  # Checkpoint file format
  format: |
    # Pipeline Checkpoint — DO NOT EDIT
    # Generated by: feature-full pipeline
    # ═══════════════════════════════════════════════════════════════

    pipeline: feature-full
    feature_id: "${FEATURE_ID}"
    created_at: "${TIMESTAMP}"
    updated_at: "${TIMESTAMP}"

    # Pipeline progress
    current_stage: "${STAGE_NAME}"
    stages_completed:
      - name: "${STAGE_NAME}"
        completed_at: "${TIMESTAMP}"
        output_key: "${OUTPUT_AS}"

    # Persisted outputs (referenced by output_key)
    outputs:
      research_findings: ${SERIALIZED}
      execution_plan: ${SERIALIZED}
      execution_results: ${SERIALIZED}

    # Resume instructions
    resume:
      next_stage: "${NEXT_STAGE}"
      context: |
        Pipeline was interrupted after ${STAGE_NAME} stage.
        Resume from ${NEXT_STAGE} with restored outputs.

  # Cleanup
  on_complete:
    action: delete_checkpoint
    description: Remove checkpoint file after successful pipeline completion
