# Pipeline: Design Decision
# ═══════════════════════════════════════════════════════════════════════════════
# Focused design decision workflow
# Used by: /yolo:decide or when feature pipeline needs decision
# ═══════════════════════════════════════════════════════════════════════════════

name: design-decision
description: Make design decisions through multi-perspective analysis
version: 1

# ───────────────────────────────────────────────────────────────────────────────
# PROFILE MAPPING
# ───────────────────────────────────────────────────────────────────────────────

profiles:
  quality:
    research: thorough
    decide: conversation

  balanced:
    research: thorough
    decide: conversation

  budget:
    research: quick
    decide: conversation  # Still use conversation for decisions

default_profile: balanced

# ───────────────────────────────────────────────────────────────────────────────
# INPUTS
# ───────────────────────────────────────────────────────────────────────────────

inputs:
  required:
    QUESTION:
      type: string
      description: The design question to answer

    OPTIONS:
      type: list
      description: Available options to consider
      min_items: 2

    DECISION_ID:
      type: string
      description: Unique identifier for the decision

    TIMESTAMP:
      type: string
      description: Timestamp for when the decision is made

  optional:
    CONTEXT:
      type: string
      description: Additional context (if research not needed)

    CONSTRAINTS:
      type: list
      description: Constraints to respect

    PRIORITY:
      type: string
      enum: [speed, quality, maintainability]
      default: quality
      description: What to optimize for

    SKIP_RESEARCH:
      type: boolean
      default: false
      description: Skip research if context already known

# ───────────────────────────────────────────────────────────────────────────────
# STAGES
# ───────────────────────────────────────────────────────────────────────────────

stages:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Research Context (optional)
  # ─────────────────────────────────────────────────────────────────────────────
  - name: research
    description: Gather context for decision
    contract: research

    # Skip if context provided
    condition: "${!SKIP_RESEARCH && !CONTEXT}"

    input:
      goal: |
        Gather context for decision:
        ${QUESTION}

        Options being considered:
        ${OPTIONS.map((o, i) => (i+1) + '. ' + o).join('\n')}

        Research:
        - How does the codebase currently handle related concerns?
        - What patterns are already established?
        - What are the implications of each option?
      scope: "src/"
      depth: medium

    output_as: research_context

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Decision
  # ─────────────────────────────────────────────────────────────────────────────
  - name: decide
    description: Multi-perspective decision analysis
    contract: decide
    implementation: conversation

    input:
      question: "${QUESTION}"
      context: "${CONTEXT || research_context?.findings || 'No additional context'}"
      options: "${OPTIONS}"
      constraints: "${CONSTRAINTS || []}"
      priority: "${PRIORITY}"

    output_as: decision_result

    validate:
      - decision_result.decision is not empty
      - decision_result.rationale is not empty
      - decision_result.approach is not empty

# ───────────────────────────────────────────────────────────────────────────────
# POST-PIPELINE
# ───────────────────────────────────────────────────────────────────────────────

on_complete:
  - action: save_decision
    path: ".planning/decisions/${DECISION_ID}.yaml"
    content:
      question: "${QUESTION}"
      options: "${OPTIONS}"
      decision: "${decision_result.decision}"
      rationale: "${decision_result.rationale}"
      approach: "${decision_result.approach}"
      alternatives: "${decision_result.alternatives_considered}"
      dissents: "${decision_result.dissents}"
      decided_at: "${TIMESTAMP}"
      priority: "${PRIORITY}"

  - action: report
    template: |
      ## Decision Made

      **Question:** ${QUESTION}

      **Decision:** ${decision_result.decision}

      **Rationale:**
      ${decision_result.rationale}

      **Approach:**
      ${decision_result.approach}

      **Dissenting Views:**
      ${decision_result.dissents?.join('\n') || 'None'}

# ───────────────────────────────────────────────────────────────────────────────
# NOTES
# ───────────────────────────────────────────────────────────────────────────────

notes: |
  The decide agent uses a conversation pattern with three perspectives:

  1. **Architect** - Long-term, maintainability, patterns
  2. **Pragmatist** - Ship fast, working code, YAGNI
  3. **Critic** - What could go wrong, edge cases, security

  Each perspective proposes, challenges others, then converges.

  Use this pipeline when:
  - Multiple valid approaches exist
  - Trade-offs are significant
  - Decision affects architecture
  - You want documented rationale
