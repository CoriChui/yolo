# Pipeline: Debug
# ═══════════════════════════════════════════════════════════════════════════════
# Systematic debugging workflow
# Used by: /yolo:debug
# ═══════════════════════════════════════════════════════════════════════════════

name: debug
description: Systematic debugging with research, hypothesis, and fix
version: 1

# ───────────────────────────────────────────────────────────────────────────────
# PROFILE MAPPING
# ───────────────────────────────────────────────────────────────────────────────

profiles:
  quality:
    research: thorough
    execute: fix
    verify: strict

  balanced:
    research: thorough
    execute: fix
    verify: basic

  budget:
    research: quick
    execute: fix
    verify: basic

default_profile: balanced

# ───────────────────────────────────────────────────────────────────────────────
# INPUTS
# ───────────────────────────────────────────────────────────────────────────────

inputs:
  required:
    BUG_DESCRIPTION:
      type: string
      description: What's broken or unexpected

    SESSION_ID:
      type: string
      description: Unique identifier for the debug session

  optional:
    ERROR_MESSAGE:
      type: string
      description: Error message if available

    REPRODUCTION_STEPS:
      type: string
      description: How to reproduce

    SUSPECTED_FILES:
      type: list
      description: Files likely involved

    SCOPE:
      type: string
      default: "src/"
      description: Where to look

    DEPTH:
      type: string
      default: "deep"
      description: Research depth (shallow, medium, deep)

# ───────────────────────────────────────────────────────────────────────────────
# STAGES
# ───────────────────────────────────────────────────────────────────────────────

stages:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Investigate
  # ─────────────────────────────────────────────────────────────────────────────
  - name: investigate
    description: Research the bug and understand root cause
    contract: research

    on_start:
      action: update_state
      updates:
        "debug.status": "investigating"

    input:
      goal: |
        Debug: ${BUG_DESCRIPTION}

        Error: ${ERROR_MESSAGE || 'No error message provided'}

        Reproduction: ${REPRODUCTION_STEPS || 'Not specified'}

        Find:
        1. Root cause of the issue
        2. Files involved
        3. Why it's happening
        4. How to fix it
      scope: "${SCOPE}"
      depth: "${DEPTH}"

    output_as: investigation

    # Custom validation for debug
    validate:
      - investigation.findings contains root cause analysis

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Hypothesis
  # ─────────────────────────────────────────────────────────────────────────────
  - name: hypothesis
    description: Formulate fix hypothesis
    contract: plan
    implementation: minimal  # Keep it focused

    input:
      goal: "Fix: ${BUG_DESCRIPTION}"
      context: |
        ## Investigation Findings
        ${investigation.findings}

        ## Root Cause
        Based on investigation, the issue appears to be in:
        ${investigation.relevant_files.join('\n')}

        ## Fix Approach
        ${investigation.suggestions?.join('\n') || "No specific suggestions"}
      max_tasks: 2  # Bug fixes should be small

    output_as: fix_plan

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: Apply Fix
  # ─────────────────────────────────────────────────────────────────────────────
  - name: fix
    description: Apply the fix
    contract: execute
    implementation: fix  # Minimal, targeted changes

    on_start:
      action: update_state
      updates:
        "debug.status": "fixing"

    loop: "${fix_plan.tasks}"
    loop_var: fix_task

    input:
      task: "${fix_task}"
      context: "${fix_task.files}"

    output_as: fix_results[]

    on_failure:
      trigger: execution-failed
      max_retries: 2

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4: Verify Fix
  # ─────────────────────────────────────────────────────────────────────────────
  - name: verify
    description: Confirm bug is fixed
    contract: verify

    on_start:
      action: update_state
      updates:
        "debug.status": "verifying"

    input:
      criteria:
        - "Bug no longer reproduces: ${BUG_DESCRIPTION}"
        - "No new errors introduced"
        - "Related tests pass"
      files: "${fix_results.flatMap(r => r.files_changed.map(f => f.path))}"
      run_tests: true

    output_as: verification

    on_failure:
      trigger: verification-failed
      max_retries: 1

# ───────────────────────────────────────────────────────────────────────────────
# POST-PIPELINE
# ───────────────────────────────────────────────────────────────────────────────

on_complete:
  - action: update_state
    updates:
      "debug.status": "resolved"

  - action: create_commit
    if: "${verification.passed}"
    message: "fix: ${BUG_DESCRIPTION}"

  - action: generate_summary
    template: debug-summary
    include:
      - root_cause
      - fix_applied
      - verification_status

on_failure:
  - action: save_debug_session
    path: ".planning/debug/${SESSION_ID}/"
    include:
      - investigation
      - fix_plan
      - fix_results
      - error_info

  - action: report
    message: |
      Debug session incomplete.
      Progress saved to: .planning/debug/${SESSION_ID}/
      Resume with: /yolo:debug --resume ${SESSION_ID}
